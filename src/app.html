<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1612" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f5f0e8" media="(prefers-color-scheme: light)" />
    <meta name="description" content="A quiet, private place for your music collection." />

    <!-- Open Graph -->
    <meta property="og:title" content="Retro Vault" />
    <meta property="og:description" content="A quiet, private place for your music collection." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://retrovault.no" />

    <!-- Fonts: all theme font stacks loaded upfront for instant switching -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Mono:wght@300;400;500&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    %sveltekit.head%

    <!-- Theme init: runs before first paint to prevent flash.
         Reads stored theme + mode from localStorage, falls back to defaults. -->
    <script>
      (function () {
        try {
          var themeId = localStorage.getItem('rv-theme-id');
          var mode = localStorage.getItem('rv-mode');
          var el = document.documentElement;

          // Apply theme (default: listening-room)
          if (themeId) {
            el.setAttribute('data-theme', themeId);
          }

          // Apply mode (default: dark, or OS preference)
          if (mode === 'light' || mode === 'dark') {
            el.setAttribute('data-mode', mode);
          } else {
            // First visit: respect OS preference
            var preferLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
            el.setAttribute('data-mode', preferLight ? 'light' : 'dark');
          }

          // Legacy compat: migrate old rv-theme key
          var oldTheme = localStorage.getItem('rv-theme');
          if (oldTheme && !mode) {
            el.setAttribute('data-mode', oldTheme === 'light' ? 'light' : 'dark');
            localStorage.setItem('rv-mode', oldTheme === 'light' ? 'light' : 'dark');
            localStorage.removeItem('rv-theme');
          }
        } catch (e) { /* SSR or disabled storage */ }
      })();
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
